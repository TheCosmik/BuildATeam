<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build-A-Team</title>
<link rel="stylesheet" href="styles.css">
<script
  async
  crossorigin="anonymous"
  data-clerk-publishable-key="pk_test_Y29vbC1ncnViLTgwLmNsZXJrLmFjY291bnRzLmRldiQ"
  onload="window.__clerkLoaded && window.__clerkLoaded()"
  src="https://cool-grub-80.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
  type="text/javascript"
></script>
</head>
<body>
  <div class="field-bg"></div>

  <div id="clerk-auth" class="clerk-auth">
    <button id="auth-signin-btn" class="btn secondary auth-btn hidden">Sign In</button>
    <div id="auth-signed-in" class="auth-signed-in hidden">
      <span id="auth-username" class="auth-username"></span>
      <button id="auth-signout-btn" class="btn secondary auth-btn">Sign Out</button>
    </div>
  </div>

  <main class="wrap">
    <h1 class="title">Build-A-<span>QB</span></h1>

    <section class="qb-figure-wrap" id="stat-board"></section>

    <section class="roll-area">
      <div id="idle-state" class="idle-state">
        <button id="roll-btn" class="btn primary">Roll for a Player</button>
      </div>

      <div id="player-card" class="player-card hidden">
        <div class="player-card-head">
          <img id="player-photo" class="player-photo" src="" alt="">
          <div class="player-card-info">
            <span id="player-name" class="player-name"></span>
            <span id="player-team" class="player-team"></span>
            <span id="player-bio" class="player-bio"></span>
          </div>
        </div>
        <div id="player-stats" class="player-stats"></div>
        <div class="player-card-actions">
          <button id="reroll-btn" class="btn secondary">Reroll (2 left)</button>
        </div>
      </div>

      <div id="name-qb-state" class="name-qb-state hidden">
        <p class="complete-msg">Your QB is built. Give your character a name:</p>
        <form id="name-qb-form" class="name-qb-form">
          <input id="character-name-input" type="text" maxlength="40" placeholder="Character name" required>
          <button type="submit" class="btn primary">Confirm</button>
        </form>
      </div>

      <div id="complete-state" class="complete-state hidden">
        <p class="complete-msg">Your QB is built.</p>
        <button id="team-btn" class="btn primary">Roll for Team</button>

        <div id="team-roll-anim" class="team-roll-anim hidden">
          <img id="roll-logo" class="roll-logo" src="" alt="">
          <span id="roll-abbr" class="roll-abbr"></span>
        </div>

        <div id="team-card" class="team-card hidden">
          <img id="team-logo" class="team-logo" src="" alt="">
          <span id="team-name" class="team-name"></span>
          <span id="team-conf" class="team-conf"></span>
        </div>

        <div id="season-sim" class="season-sim hidden">
          <p class="sim-label">Simulating Season</p>

          <div class="scoreboard">
            <div id="sim-week" class="scoreboard-week">WEEK 1 / 17</div>
            <div class="scoreboard-score">
              <div class="score-side">
                <span class="score-tag">YOU</span>
                <span id="score-you" class="score-value">0</span>
              </div>
              <span class="score-divider">–</span>
              <div class="score-side">
                <span id="score-opp" class="score-value">0</span>
                <span class="score-tag">OPP</span>
              </div>
            </div>
            <div id="sim-flash" class="sim-flash"></div>
          </div>

          <div id="week-tracker" class="week-tracker"></div>
          <p id="sim-tally" class="sim-tally"></p>
        </div>

        <div id="season-result" class="season-result hidden">
          <p id="result-record" class="result-record"></p>
          <p id="result-msg" class="result-msg"></p>
          <button id="continue-btn" class="btn primary hidden">Continue to Playoffs</button>
          <button id="retry-btn" class="btn secondary hidden">Try Again</button>
        </div>

        <div id="playoff-state" class="playoff-state hidden">
          <p id="playoff-round-label" class="playoff-round-label"></p>

          <div id="game-field" class="game-field">
            <div class="endzone endzone-you"></div>
            <div class="field-lines"></div>
            <div class="endzone endzone-opp"></div>
            <div id="ball" class="ball">&#127944;</div>
            <div id="play-flash" class="play-flash"></div>
          </div>

          <div class="playoff-score">
            <div class="playoff-team-col">
              <img id="playoff-your-logo" class="playoff-logo" src="" alt="">
              <span id="playoff-your-name" class="playoff-team-name"></span>
              <span id="playoff-your-score" class="playoff-score-value">0</span>
            </div>
            <span class="playoff-vs">VS</span>
            <div class="playoff-team-col">
              <img id="playoff-opp-logo" class="playoff-logo" src="" alt="">
              <span id="playoff-opp-name" class="playoff-team-name"></span>
              <span id="playoff-opp-score" class="playoff-score-value">0</span>
            </div>
          </div>
        </div>

        <div id="playoff-result" class="playoff-result hidden">
          <p id="playoff-result-msg" class="playoff-result-msg"></p>
          <button id="playoff-retry-btn" class="btn secondary hidden">Try Again</button>
        </div>
      </div>
    </section>
  </main>

  <script src="players.js"></script>
  <script src="teams.js"></script>
  <script src="app.js"></script>
</body>
</html>
