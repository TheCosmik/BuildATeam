<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop - Build-A-Team</title>
<link rel="stylesheet" href="styles.css">
<script
  async
  crossorigin="anonymous"
  data-clerk-publishable-key="pk_test_Y29vbC1ncnViLTgwLmNsZXJrLmFjY291bnRzLmRldiQ"
  onload="window.__clerkLoaded && window.__clerkLoaded()"
  src="https://cool-grub-80.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
  type="text/javascript"
></script>
</head>
<body>
  <div class="field-bg"></div>

  <div id="clerk-auth" class="clerk-auth">
    <button id="auth-signin-btn" class="btn secondary auth-btn hidden">Sign In</button>
    <div id="auth-signed-in" class="auth-signed-in hidden">
      <a id="auth-username" class="auth-username" href="#"></a>
      <button id="auth-signout-btn" class="btn secondary auth-btn">Sign Out</button>
    </div>
  </div>

  <main class="wrap">
    <h1 class="title">Build-A-<span>QB</span></h1>

    <nav class="site-nav">
      <a href="index.html" class="site-nav-tab">Quick Play</a>
      <a href="career.html" class="site-nav-tab">My Career</a>
      <a href="shop.html" class="site-nav-tab active">Shop</a>
      <a href="inventory.html" class="site-nav-tab">Inventory</a>
    </nav>

    <section id="shop-signin" class="career-gate hidden">
      <p class="complete-msg">Sign in to visit the shop.</p>
      <button id="shop-signin-btn" class="btn primary">Sign In</button>
    </section>

    <section id="shop-loading" class="career-gate">
      <p class="complete-msg">Loading shop...</p>
    </section>

    <section id="shop-content" class="shop-content hidden">
      <div class="shop-header">
        <p class="profile-section-label">Shop</p>
        <span id="shop-balance" class="career-points-balance">$0</span>
      </div>
      <div id="shop-items" class="shop-items"></div>
    </section>
  </main>

  <script src="shop.js"></script>
</body>
</html>
